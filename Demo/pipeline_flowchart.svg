<svg width="600" height="1100" viewBox="0 0 600 1100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#374151;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4B5563;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="secondaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B7280;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9CA3AF;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="1100" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="300" y="40" text-anchor="middle" fill="#1E293B" font-family="Inter, sans-serif" font-size="24" font-weight="700">
    Iterative Protein Design Pipeline
  </text>

  <!-- Step 1: Generation -->
  <g transform="translate(210, 80)">
    <rect width="180" height="120" rx="12" fill="url(#primaryGrad)" filter="url(#shadow)"/>
    <text x="90" y="25" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="16" font-weight="700">
      GENERATION
    </text>
    <text x="90" y="45" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="12" font-weight="600">
      BoltzGen Model
    </text>
    <text x="90" y="62" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="11">
      • 1000+ protein candidates
    </text>
    <text x="90" y="77" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="11">
      • Target-specific design
    </text>
    <text x="90" y="92" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="11">
      • Structure-based sampling
    </text>
    <text x="90" y="107" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="11">
      • Diversity optimization
    </text>
  </g>

  <!-- Arrow 1 (down) -->
  <path d="M 300 220 L 300 270" stroke="#4B5563" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Step 2: Scoring -->
  <g transform="translate(210, 290)">
    <rect width="180" height="120" rx="12" fill="url(#secondaryGrad)" filter="url(#shadow)"/>
    <text x="90" y="25" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="16" font-weight="700">
      SCORING
    </text>
    <text x="90" y="45" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="12" font-weight="600">
      Multi-Model Evaluation
    </text>
    <text x="90" y="62" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="11">
      • Boltz-2: Binding affinity
    </text>
    <text x="90" y="77" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="11">
      • AutoDock Vina: Physics
    </text>
    <text x="90" y="92" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="11">
      • GNINA: Deep learning
    </text>
    <text x="90" y="107" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="11">
      • Rank top 10% for analysis
    </text>
  </g>

  <!-- Arrow 2 (down) -->
  <path d="M 300 430 L 300 480" stroke="#4B5563" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Step 3: Analysis -->
  <g transform="translate(210, 500)">
    <rect width="180" height="120" rx="12" fill="url(#primaryGrad)" filter="url(#shadow)"/>
    <text x="90" y="25" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="16" font-weight="700">
      ANALYSIS
    </text>
    <text x="90" y="45" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="12" font-weight="600">
      Integrated Gradients
    </text>
    <text x="90" y="62" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="11">
      • Chai-2: Structural impact
    </text>
    <text x="90" y="77" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="11">
      • Boltz-2: Binding contribution
    </text>
    <text x="90" y="92" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="11">
      • ESM-2: Functional importance
    </text>
    <text x="90" y="107" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="11">
      • Per-residue attribution
    </text>
  </g>

  <!-- Arrow 3 (down) -->
  <path d="M 300 640 L 300 680" stroke="#4B5563" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>

  <!-- IG Heatmap Visualization -->
  <g transform="translate(150, 700)">
    <rect width="300" height="120" rx="8" fill="white" stroke="#374151" stroke-width="3" filter="url(#shadow)"/>

    <!-- Title -->
    <text x="150" y="20" text-anchor="middle" fill="#374151" font-family="Inter, sans-serif" font-size="14" font-weight="600">
      Integrated Gradients Heatmap
    </text>

    <!-- Position labels -->
    <text x="30" y="45" fill="#6B7280" font-family="Inter, sans-serif" font-size="12" font-weight="500">Position:</text>
    <text x="110" y="45" text-anchor="middle" fill="#6B7280" font-family="Inter, sans-serif" font-size="12" font-weight="500">1</text>
    <text x="150" y="45" text-anchor="middle" fill="#6B7280" font-family="Inter, sans-serif" font-size="12" font-weight="500">2</text>
    <text x="190" y="45" text-anchor="middle" fill="#6B7280" font-family="Inter, sans-serif" font-size="12" font-weight="500">3</text>

    <!-- Heatmap grid box -->
    <rect x="90" y="55" width="120" height="45" fill="none" stroke="#374151" stroke-width="2"/>

    <!-- Chai-2 heatmap row -->
    <text x="15" y="68" fill="#6B7280" font-family="Inter, sans-serif" font-size="12" font-weight="500">Chai-2</text>
    <rect x="95" y="58" width="25" height="12" fill="#BBF7D0" stroke="#374151" stroke-width="1"/>
    <rect x="125" y="58" width="25" height="12" fill="#15803D" stroke="#374151" stroke-width="1"/>
    <rect x="155" y="58" width="25" height="12" fill="#4ADE80" stroke="#374151" stroke-width="1"/>

    <!-- Boltz-2 heatmap row -->
    <text x="15" y="83" fill="#6B7280" font-family="Inter, sans-serif" font-size="12" font-weight="500">Boltz-2</text>
    <rect x="95" y="73" width="25" height="12" fill="#4ADE80" stroke="#374151" stroke-width="1"/>
    <rect x="125" y="73" width="25" height="12" fill="#15803D" stroke="#374151" stroke-width="1"/>
    <rect x="155" y="73" width="25" height="12" fill="#BBF7D0" stroke="#374151" stroke-width="1"/>

    <!-- ESM-2 heatmap row -->
    <text x="15" y="98" fill="#6B7280" font-family="Inter, sans-serif" font-size="12" font-weight="500">ESM-2</text>
    <rect x="95" y="88" width="25" height="12" fill="#86EFAC" stroke="#374151" stroke-width="1"/>
    <rect x="125" y="88" width="25" height="12" fill="#15803D" stroke="#374151" stroke-width="1"/>
    <rect x="155" y="88" width="25" height="12" fill="#F0FDF4" stroke="#374151" stroke-width="1"/>

    <!-- Legend -->
    <g transform="translate(230, 60)">
      <rect x="0" y="0" width="15" height="10" fill="#15803D" stroke="#374151"/>
      <text x="18" y="8" fill="#6B7280" font-family="Inter, sans-serif" font-size="10">High</text>
      <rect x="0" y="15" width="15" height="10" fill="#4ADE80" stroke="#374151"/>
      <text x="18" y="23" fill="#6B7280" font-family="Inter, sans-serif" font-size="10">Med</text>
      <rect x="0" y="30" width="15" height="10" fill="#BBF7D0" stroke="#374151"/>
      <text x="18" y="38" fill="#6B7280" font-family="Inter, sans-serif" font-size="10">Low</text>
    </g>
  </g>

  <!-- Arrow 4 (down) -->
  <path d="M 300 840 L 300 880" stroke="#4B5563" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Step 4: Optimization -->
  <g transform="translate(210, 900)">
    <rect width="180" height="120" rx="12" fill="url(#secondaryGrad)" filter="url(#shadow)"/>
    <text x="90" y="25" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="16" font-weight="700">
      OPTIMIZATION
    </text>
    <text x="90" y="45" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="12" font-weight="600">
      Constraint-Based Design
    </text>
    <text x="90" y="62" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="11">
      • Lock critical positions
    </text>
    <text x="90" y="77" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="11">
      • Constrain important regions
    </text>
    <text x="90" y="92" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="11">
      • Explore variable positions
    </text>
    <text x="90" y="107" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="11">
      • Generate next iteration
    </text>
  </g>

  <!-- Return arrow (back to start) -->
  <path d="M 210 1020 Q 50 1020 50 140 Q 50 90 180 90" stroke="#4B5563" stroke-width="3" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="8,4"/>

  <!-- Iteration label -->
  <text x="30" y="600" text-anchor="middle" fill="#6B7280" font-family="Inter, sans-serif" font-size="12" font-weight="600" transform="rotate(-90 30 600)">
    Iterative Refinement
  </text>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4B5563"/>
    </marker>
  </defs>
</svg>