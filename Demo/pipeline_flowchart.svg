<svg width="600" height="1200" viewBox="0 0 600 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#475569;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#64748B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="secondaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64748B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#94A3B8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="heatmapBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F8FAFC;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="1200" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="300" y="40" text-anchor="middle" fill="#374151" font-family="Inter, sans-serif" font-size="24" font-weight="700">
    Iterative Protein Design Pipeline
  </text>

  <!-- Step 1: Generation -->
  <g transform="translate(210, 80)">
    <rect width="180" height="120" rx="12" fill="url(#primaryGrad)" filter="url(#shadow)"/>
    <text x="90" y="25" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="16" font-weight="700">
      GENERATION
    </text>
    <text x="90" y="45" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="12" font-weight="600">
      BoltzGen Model
    </text>
    <text x="90" y="62" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="11">
      • 1000+ protein candidates
    </text>
    <text x="90" y="77" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="11">
      • Target-specific design
    </text>
    <text x="90" y="92" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="11">
      • Structure-based sampling
    </text>
    <text x="90" y="107" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="11">
      • Diversity optimization
    </text>
  </g>

  <!-- Arrow 1 (down) -->
  <path d="M 300 220 L 300 270" stroke="#475569" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Step 2: Scoring -->
  <g transform="translate(210, 290)">
    <rect width="180" height="120" rx="12" fill="url(#secondaryGrad)" filter="url(#shadow)"/>
    <text x="90" y="25" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="16" font-weight="700">
      SCORING
    </text>
    <text x="90" y="45" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="12" font-weight="600">
      Multi-Model Evaluation
    </text>
    <text x="90" y="62" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="11">
      • Boltz-2: Binding affinity
    </text>
    <text x="90" y="77" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="11">
      • AutoDock Vina: Physics
    </text>
    <text x="90" y="92" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="11">
      • GNINA: Deep learning
    </text>
    <text x="90" y="107" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="11">
      • Rank top 10% for analysis
    </text>
  </g>

  <!-- Arrow 2 (down) -->
  <path d="M 300 430 L 300 480" stroke="#475569" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Step 3: Analysis -->
  <g transform="translate(210, 500)">
    <rect width="180" height="120" rx="12" fill="url(#primaryGrad)" filter="url(#shadow)"/>
    <text x="90" y="25" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="16" font-weight="700">
      ANALYSIS
    </text>
    <text x="90" y="45" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="12" font-weight="600">
      Integrated Gradients
    </text>
    <text x="90" y="62" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="11">
      • Chai-2: Structural impact
    </text>
    <text x="90" y="77" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="11">
      • Boltz-2: Binding contribution
    </text>
    <text x="90" y="92" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="11">
      • ESM-2: Functional importance
    </text>
    <text x="90" y="107" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="11">
      • Per-residue attribution
    </text>
  </g>

  <!-- Arrow 3 (down) -->
  <path d="M 300 640 L 300 680" stroke="#475569" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>

  <!-- IG Heatmap Visualization -->
  <g transform="translate(50, 700)">
    <rect width="500" height="180" rx="4" fill="url(#heatmapBg)" stroke="#374151" stroke-width="2" filter="url(#shadow)"/>

    <!-- Title -->
    <text x="250" y="20" text-anchor="middle" fill="#1E40AF" font-family="Inter, sans-serif" font-size="14" font-weight="700">
      Integrated Gradients Heatmap
    </text>

    <!-- Position labels -->
    <text x="20" y="40" fill="#6B7280" font-family="Inter, sans-serif" font-size="10" font-weight="500">Pos:</text>
    <text x="65" y="40" text-anchor="middle" fill="#6B7280" font-family="Inter, sans-serif" font-size="10">1</text>
    <text x="95" y="40" text-anchor="middle" fill="#6B7280" font-family="Inter, sans-serif" font-size="10">2</text>
    <text x="125" y="40" text-anchor="middle" fill="#6B7280" font-family="Inter, sans-serif" font-size="10">3</text>
    <text x="155" y="40" text-anchor="middle" fill="#6B7280" font-family="Inter, sans-serif" font-size="10">4</text>
    <text x="185" y="40" text-anchor="middle" fill="#6B7280" font-family="Inter, sans-serif" font-size="10">5</text>
    <text x="215" y="40" text-anchor="middle" fill="#6B7280" font-family="Inter, sans-serif" font-size="10">6</text>
    <text x="245" y="40" text-anchor="middle" fill="#6B7280" font-family="Inter, sans-serif" font-size="10">7</text>
    <text x="275" y="40" text-anchor="middle" fill="#6B7280" font-family="Inter, sans-serif" font-size="10">8</text>
    <text x="305" y="40" text-anchor="middle" fill="#6B7280" font-family="Inter, sans-serif" font-size="10">9</text>
    <text x="335" y="40" text-anchor="middle" fill="#6B7280" font-family="Inter, sans-serif" font-size="10">10</text>

    <!-- Consensus highlights for positions 3 and 7 -->
    <rect x="110" y="47" width="30" height="80" fill="none" stroke="#DC2626" stroke-width="4" stroke-dasharray="6,3" rx="2"/>
    <rect x="230" y="47" width="30" height="80" fill="none" stroke="#DC2626" stroke-width="4" stroke-dasharray="6,3" rx="2"/>

    <!-- Consensus background highlights -->
    <rect x="110" y="47" width="30" height="80" fill="#FEE2E2" fill-opacity="0.4" rx="2"/>
    <rect x="230" y="47" width="30" height="80" fill="#FEE2E2" fill-opacity="0.4" rx="2"/>

    <!-- Solubility heatmap row -->
    <text x="10" y="103" fill="#9333EA" font-family="Inter, sans-serif" font-size="10" font-weight="600">NetSolP</text>
    <rect x="55" y="95" width="20" height="12" fill="#86EFAC" stroke="#374151"/>
    <rect x="85" y="95" width="20" height="12" fill="#F0FDF4" stroke="#374151"/>
    <rect x="115" y="95" width="20" height="12" fill="#15803D" stroke="#374151"/>
    <rect x="145" y="95" width="20" height="12" fill="#BBF7D0" stroke="#374151"/>
    <rect x="175" y="95" width="20" height="12" fill="#4ADE80" stroke="#374151"/>
    <rect x="205" y="95" width="20" height="12" fill="#86EFAC" stroke="#374151"/>
    <rect x="235" y="95" width="20" height="12" fill="#15803D" stroke="#374151"/>
    <rect x="265" y="95" width="20" height="12" fill="#BBF7D0" stroke="#374151"/>
    <rect x="295" y="95" width="20" height="12" fill="#F0FDF4" stroke="#374151"/>
    <rect x="325" y="95" width="20" height="12" fill="#86EFAC" stroke="#374151"/>

    <!-- Stability heatmap row -->
    <text x="10" y="118" fill="#DC2626" font-family="Inter, sans-serif" font-size="10" font-weight="600">OpenMM</text>
    <rect x="55" y="110" width="20" height="12" fill="#F0FDF4" stroke="#374151"/>
    <rect x="85" y="110" width="20" height="12" fill="#86EFAC" stroke="#374151"/>
    <rect x="115" y="110" width="20" height="12" fill="#15803D" stroke="#374151"/>
    <rect x="145" y="110" width="20" height="12" fill="#4ADE80" stroke="#374151"/>
    <rect x="175" y="110" width="20" height="12" fill="#BBF7D0" stroke="#374151"/>
    <rect x="205" y="110" width="20" height="12" fill="#F0FDF4" stroke="#374151"/>
    <rect x="235" y="110" width="20" height="12" fill="#15803D" stroke="#374151"/>
    <rect x="265" y="110" width="20" height="12" fill="#86EFAC" stroke="#374151"/>
    <rect x="295" y="110" width="20" height="12" fill="#4ADE80" stroke="#374151"/>
    <rect x="325" y="110" width="20" height="12" fill="#BBF7D0" stroke="#374151"/>

    <!-- Consensus labels with background -->
    <rect x="105" y="137" width="40" height="16" fill="#DC2626" rx="3"/>
    <text x="125" y="148" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="10" font-weight="700">LOCK</text>
    <rect x="225" y="137" width="40" height="16" fill="#DC2626" rx="3"/>
    <text x="245" y="148" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="10" font-weight="700">LOCK</text>

    <!-- Chai-2 heatmap row -->
    <text x="10" y="58" fill="#7C3AED" font-family="Inter, sans-serif" font-size="10" font-weight="600">Chai-2</text>
    <rect x="55" y="50" width="20" height="12" fill="#BBF7D0" stroke="#374151"/>
    <rect x="85" y="50" width="20" height="12" fill="#86EFAC" stroke="#374151"/>
    <rect x="115" y="50" width="20" height="12" fill="#15803D" stroke="#374151"/>
    <rect x="145" y="50" width="20" height="12" fill="#F0FDF4" stroke="#374151"/>
    <rect x="175" y="50" width="20" height="12" fill="#4ADE80" stroke="#374151"/>
    <rect x="205" y="50" width="20" height="12" fill="#BBF7D0" stroke="#374151"/>
    <rect x="235" y="50" width="20" height="12" fill="#15803D" stroke="#374151"/>
    <rect x="265" y="50" width="20" height="12" fill="#F0FDF4" stroke="#374151"/>
    <rect x="295" y="50" width="20" height="12" fill="#86EFAC" stroke="#374151"/>
    <rect x="325" y="50" width="20" height="12" fill="#4ADE80" stroke="#374151"/>

    <!-- Boltz-2 heatmap row -->
    <text x="10" y="73" fill="#2563EB" font-family="Inter, sans-serif" font-size="10" font-weight="600">Boltz-2</text>
    <rect x="55" y="65" width="20" height="12" fill="#4ADE80" stroke="#374151"/>
    <rect x="85" y="65" width="20" height="12" fill="#F0FDF4" stroke="#374151"/>
    <rect x="115" y="65" width="20" height="12" fill="#15803D" stroke="#374151"/>
    <rect x="145" y="65" width="20" height="12" fill="#86EFAC" stroke="#374151"/>
    <rect x="175" y="65" width="20" height="12" fill="#BBF7D0" stroke="#374151"/>
    <rect x="205" y="65" width="20" height="12" fill="#F0FDF4" stroke="#374151"/>
    <rect x="235" y="65" width="20" height="12" fill="#15803D" stroke="#374151"/>
    <rect x="265" y="65" width="20" height="12" fill="#BBF7D0" stroke="#374151"/>
    <rect x="295" y="65" width="20" height="12" fill="#4ADE80" stroke="#374151"/>
    <rect x="325" y="65" width="20" height="12" fill="#86EFAC" stroke="#374151"/>

    <!-- ESM-2 heatmap row -->
    <text x="10" y="88" fill="#EA580C" font-family="Inter, sans-serif" font-size="10" font-weight="600">ESM-2</text>
    <rect x="55" y="80" width="20" height="12" fill="#86EFAC" stroke="#374151"/>
    <rect x="85" y="80" width="20" height="12" fill="#BBF7D0" stroke="#374151"/>
    <rect x="115" y="80" width="20" height="12" fill="#15803D" stroke="#374151"/>
    <rect x="145" y="80" width="20" height="12" fill="#F0FDF4" stroke="#374151"/>
    <rect x="175" y="80" width="20" height="12" fill="#86EFAC" stroke="#374151"/>
    <rect x="205" y="80" width="20" height="12" fill="#4ADE80" stroke="#374151"/>
    <rect x="235" y="80" width="20" height="12" fill="#15803D" stroke="#374151"/>
    <rect x="265" y="80" width="20" height="12" fill="#F0FDF4" stroke="#374151"/>
    <rect x="295" y="80" width="20" height="12" fill="#BBF7D0" stroke="#374151"/>
    <rect x="325" y="80" width="20" height="12" fill="#4ADE80" stroke="#374151"/>

    <!-- Legend -->
    <g transform="translate(380, 50)">
      <rect x="-10" y="-5" width="100" height="50" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" rx="8"/>
      <text x="35" y="8" text-anchor="middle" fill="#374151" font-family="Inter, sans-serif" font-size="10" font-weight="600">Importance</text>
      <rect x="5" y="15" width="18" height="8" fill="#15803D" stroke="none" rx="2"/>
      <text x="26" y="21" fill="#374151" font-family="Inter, sans-serif" font-size="9" font-weight="500">High</text>
      <rect x="5" y="25" width="18" height="8" fill="#4ADE80" stroke="none" rx="2"/>
      <text x="26" y="31" fill="#374151" font-family="Inter, sans-serif" font-size="9" font-weight="500">Med</text>
      <rect x="5" y="35" width="18" height="8" fill="#BBF7D0" stroke="none" rx="2"/>
      <text x="26" y="41" fill="#374151" font-family="Inter, sans-serif" font-size="9" font-weight="500">Low</text>
